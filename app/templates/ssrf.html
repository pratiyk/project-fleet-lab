<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSRF Test - ProjectFleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-danger">SSRF Test Endpoint</h2>
                <form method="post">
                    <div class="mb-3">
                        <label for="url" class="form-label">URL to Fetch</label>
                        <input type="text" class="form-control" id="url" name="url" placeholder="http://169.254.169.254/latest/meta-data/iam/security-credentials/">
                    </div>
                    <button type="submit" class="btn btn-danger">Fetch</button>
                </form>
                {% if result %}
                <hr>
                <h5>Result:</h5>
                <pre>{{ result }}</pre>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
